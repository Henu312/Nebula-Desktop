<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wallpaper" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111418"/>
      <stop offset="0.42" stop-color="#1d2b2f"/>
      <stop offset="1" stop-color="#2b2631"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1180 190) rotate(130) scale(520 340)">
      <stop stop-color="#68D8C2" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#68D8C2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(230 810) rotate(-30) scale(480 320)">
      <stop stop-color="#F3B562" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#F3B562" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
    <style>
      .label { font-family: "Segoe UI", Arial, sans-serif; fill: #E7EDF2; }
      .muted { font-family: "Segoe UI", Arial, sans-serif; fill: #AAB5BD; }
      .tiny { font-size: 18px; }
      .small { font-size: 22px; }
      .normal { font-size: 26px; }
      .title { font-size: 44px; font-weight: 700; }
      .panel { fill: rgba(25, 30, 34, 0.82); stroke: rgba(255,255,255,0.12); }
      .panel2 { fill: rgba(31, 37, 42, 0.86); stroke: rgba(255,255,255,0.10); }
      .chip { fill: rgba(255,255,255,0.08); stroke: rgba(255,255,255,0.10); }
      .accent { fill: #68D8C2; }
      .warm { fill: #F3B562; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#wallpaper)"/>
  <rect width="1600" height="1000" fill="url(#glowA)"/>
  <rect width="1600" height="1000" fill="url(#glowB)"/>

  <!-- desktop windows -->
  <g filter="url(#shadow)" opacity="0.9">
    <rect x="88" y="168" width="540" height="358" rx="14" class="panel"/>
    <rect x="88" y="168" width="540" height="52" rx="14" fill="rgba(255,255,255,0.06)"/>
    <circle cx="122" cy="194" r="7" fill="#F26B64"/>
    <circle cx="147" cy="194" r="7" fill="#F3B562"/>
    <circle cx="172" cy="194" r="7" fill="#68D8C2"/>
    <text x="208" y="202" class="muted small">Visual Studio Code</text>
    <rect x="122" y="254" width="170" height="18" rx="4" fill="#68D8C2" opacity="0.72"/>
    <rect x="122" y="296" width="402" height="14" rx="4" fill="#77838A" opacity="0.42"/>
    <rect x="122" y="326" width="344" height="14" rx="4" fill="#77838A" opacity="0.34"/>
    <rect x="122" y="356" width="442" height="14" rx="4" fill="#77838A" opacity="0.30"/>
    <rect x="122" y="410" width="236" height="18" rx="4" fill="#F3B562" opacity="0.72"/>
    <rect x="122" y="452" width="386" height="14" rx="4" fill="#77838A" opacity="0.34"/>
  </g>

  <g filter="url(#shadow)" opacity="0.78">
    <rect x="972" y="250" width="440" height="298" rx="14" class="panel"/>
    <rect x="1008" y="292" width="185" height="22" rx="5" fill="#E7EDF2" opacity="0.72"/>
    <rect x="1008" y="338" width="320" height="14" rx="4" fill="#77838A" opacity="0.36"/>
    <rect x="1008" y="368" width="260" height="14" rx="4" fill="#77838A" opacity="0.30"/>
    <rect x="1008" y="426" width="132" height="44" rx="8" fill="#68D8C2" opacity="0.82"/>
    <rect x="1160" y="426" width="132" height="44" rx="8" fill="#FFFFFF" opacity="0.08"/>
  </g>

  <!-- top taskbar -->
  <g filter="url(#softShadow)">
    <rect x="220" y="28" width="1160" height="72" rx="28" class="panel"/>
    <rect x="245" y="43" width="42" height="42" rx="13" fill="#68D8C2"/>
    <text x="303" y="72" class="label small" font-weight="700">Nebula</text>

    <g transform="translate(478 42)">
      <rect width="48" height="48" rx="14" fill="#2D7CF6"/>
      <rect x="12" y="13" width="24" height="22" rx="4" fill="white" opacity="0.9"/>
    </g>
    <g transform="translate(546 42)">
      <rect width="48" height="48" rx="14" fill="#24292F"/>
      <path d="M14 30L24 14L34 30H14Z" fill="#68D8C2"/>
    </g>
    <g transform="translate(614 42)">
      <rect width="48" height="48" rx="14" fill="#5D43D6"/>
      <rect x="13" y="13" width="22" height="22" rx="6" fill="#F3B562"/>
      <circle cx="39" cy="9" r="6" class="warm"/>
    </g>
    <g transform="translate(682 42)">
      <rect width="48" height="48" rx="14" fill="#1F6FEB"/>
      <circle cx="24" cy="24" r="13" fill="#E7EDF2"/>
    </g>
    <g transform="translate(750 42)">
      <rect width="48" height="48" rx="14" fill="#22272E"/>
      <path d="M13 18H35M13 25H35M13 32H28" stroke="#E7EDF2" stroke-width="3" stroke-linecap="round"/>
      <circle cx="40" cy="9" r="6" class="accent"/>
    </g>

    <rect x="1046" y="47" width="72" height="34" rx="17" class="chip"/>
    <text x="1063" y="70" class="muted tiny">125%</text>
    <rect x="1130" y="47" width="92" height="34" rx="17" class="chip"/>
    <text x="1148" y="70" class="muted tiny">22:48</text>
    <rect x="1236" y="47" width="112" height="34" rx="17" fill="rgba(104,216,194,0.14)" stroke="rgba(104,216,194,0.35)"/>
    <text x="1255" y="70" class="label tiny">Control</text>
  </g>

  <!-- launcher -->
  <g filter="url(#shadow)">
    <rect x="460" y="178" width="680" height="520" rx="22" class="panel2"/>
    <rect x="500" y="220" width="600" height="66" rx="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)"/>
    <circle cx="535" cy="253" r="12" fill="none" stroke="#AAB5BD" stroke-width="4"/>
    <path d="M544 262L558 276" stroke="#AAB5BD" stroke-width="4" stroke-linecap="round"/>
    <text x="580" y="263" class="label normal">open vscode</text>
    <text x="500" y="330" class="muted tiny">应用与最近项目</text>

    <g transform="translate(500 356)">
      <rect width="600" height="68" rx="16" fill="rgba(104,216,194,0.15)" stroke="rgba(104,216,194,0.38)"/>
      <rect x="18" y="14" width="40" height="40" rx="12" fill="#2D7CF6"/>
      <text x="78" y="41" class="label small" font-weight="700">Visual Studio Code</text>
      <text x="456" y="41" class="muted tiny">Enter</text>
    </g>
    <g transform="translate(500 440)">
      <rect width="600" height="58" rx="15" fill="rgba(255,255,255,0.055)"/>
      <rect x="18" y="12" width="34" height="34" rx="10" fill="#24292F"/>
      <text x="78" y="36" class="label small">Windows Terminal</text>
    </g>
    <g transform="translate(500 510)">
      <rect width="600" height="58" rx="15" fill="rgba(255,255,255,0.045)"/>
      <rect x="18" y="12" width="34" height="34" rx="10" fill="#F3B562"/>
      <text x="78" y="36" class="label small">D:\data\Nebula_Desktop</text>
    </g>
    <g transform="translate(500 580)">
      <rect width="600" height="58" rx="15" fill="rgba(255,255,255,0.045)"/>
      <rect x="18" y="12" width="34" height="34" rx="10" fill="#68D8C2"/>
      <text x="78" y="36" class="label small">Control Center</text>
    </g>
  </g>

  <!-- control center -->
  <g filter="url(#shadow)">
    <rect x="1120" y="130" width="360" height="430" rx="24" class="panel2"/>
    <text x="1152" y="178" class="label normal" font-weight="700">Control Center</text>
    <text x="1152" y="208" class="muted tiny">Windows 原生设置入口</text>

    <rect x="1152" y="236" width="132" height="92" rx="18" fill="rgba(104,216,194,0.15)" stroke="rgba(104,216,194,0.28)"/>
    <text x="1178" y="272" class="label small" font-weight="700">WiFi</text>
    <text x="1178" y="302" class="muted tiny">Connected</text>

    <rect x="1304" y="236" width="132" height="92" rx="18" class="chip"/>
    <text x="1324" y="272" class="label small" font-weight="700">Bluetooth</text>
    <text x="1324" y="302" class="muted tiny">On</text>

    <rect x="1152" y="352" width="284" height="86" rx="18" class="chip"/>
    <text x="1178" y="385" class="label small" font-weight="700">Volume</text>
    <rect x="1178" y="408" width="214" height="8" rx="4" fill="rgba(255,255,255,0.16)"/>
    <rect x="1178" y="408" width="150" height="8" rx="4" fill="#68D8C2"/>
    <circle cx="1328" cy="412" r="12" fill="#E7EDF2"/>

    <rect x="1152" y="460" width="132" height="62" rx="18" class="chip"/>
    <text x="1182" y="498" class="label tiny">Night</text>
    <rect x="1304" y="460" width="132" height="62" rx="18" class="chip"/>
    <text x="1332" y="498" class="label tiny">Power</text>
  </g>

  <!-- dock hint -->
  <g filter="url(#softShadow)" opacity="0.92">
    <rect x="530" y="884" width="540" height="64" rx="28" class="panel"/>
    <text x="575" y="923" class="muted tiny">Phase 2 Dock 独立开关 / Hover 放大 / 最近应用</text>
  </g>

  <text x="92" y="918" class="label title">Nebula Desktop</text>
  <text x="94" y="952" class="muted small">Windows 10 / Windows 11 Desktop Enhancement Layer</text>
</svg>
